kind = "mobile"
previewPath = "/"
title = "BrainGuard"
version = "1.0.0"
id = "artifacts/brainguard"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23798

[services.development]
run = "pnpm --filter @workspace/brainguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brainguard", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/brainguard", "run", "serve" ]

[services.env]
PORT = "23798"
BASE_PATH = "/"

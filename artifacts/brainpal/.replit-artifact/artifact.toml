kind = "web"
previewPath = "/"
title = "BrainPal"
version = "1.0.0"
id = "artifacts/brainpal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18434

[services.development]
run = "pnpm --filter @workspace/brainpal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brainpal", "run", "build" ]
publicDir = "artifacts/brainpal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18434"
BASE_PATH = "/"
